name: Build SiYuan Custom

on:
  workflow_dispatch:
    inputs:
      build_desktop:
        description: '构建桌面客户端 (Windows/macOS/Linux)'
        required: false
        default: 'true'
        type: boolean
      build_docker:
        description: '构建 Docker 镜像并推送'
        required: false
        default: 'false'
        type: boolean
      docker_tag:
        description: 'Docker 镜像标签 (留空则使用 package.json 版本号)'
        required: false
        default: ''
      upload_release:
        description: '上传到 GitHub Release'
        required: false
        default: 'false'
        type: boolean

env:
  package_json: "app/package.json"
  docker_hub_owner: "${{ secrets.DOCKER_HUB_USERNAME }}"
  docker_hub_repo: "siyuan-custom"

jobs:
  # 获取版本信息
  get_version:
    name: Get Version Info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      packageManager: ${{ steps.packageManager.outputs.value }}
      release_tag: ${{ steps.release_tag.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from package.json
        uses: sergeysova/jq-action@v2
        id: version
        with:
          cmd: "jq .version ${{ env.package_json }} -r"

      - name: Extract packageManager from package.json
        uses: sergeysova/jq-action@v2
        id: packageManager
        with:
          cmd: "jq .packageManager ${{ env.package_json }} -r"

      - name: Generate release tag
        id: release_tag
        run: echo "tag=v${{ steps.version.outputs.value }}-${{ github.run_id }}" >> $GITHUB_OUTPUT

  # 构建桌面客户端
  build_desktop:
    if: ${{ github.event.inputs.build_desktop == 'true' }}
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.name }}
    needs: get_version
    strategy:
      matrix:
        config:
          - os: ubuntu-24.04
            name: Linux AppImage
            kernel_path: "../app/kernel-linux/SiYuan-Kernel"
            build_args_prefix: "-s -w -X"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-linux"
            goos: "linux"
            goarch: "amd64"
            suffix: "linux.AppImage"
          - os: ubuntu-24.04
            name: Linux tar.gz
            kernel_path: "../app/kernel-linux/SiYuan-Kernel"
            build_args_prefix: "-s -w -X"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-linux"
            goos: "linux"
            goarch: "amd64"
            suffix: "linux.tar.gz"
          - os: macos-latest
            name: macOS Intel DMG
            kernel_path: "../app/kernel-darwin/SiYuan-Kernel"
            build_args_prefix: "-s -w -X"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-darwin"
            goos: "darwin"
            goarch: "amd64"
            suffix: "mac.dmg"
          - os: macos-latest
            name: macOS ARM64 DMG
            kernel_path: "../app/kernel-darwin-arm64/SiYuan-Kernel"
            build_args_prefix: "-s -w -X"
            build_args_suffix: "Mode=prod"
            electron_args: "dist-darwin-arm64"
            goos: "darwin"
            goarch: "arm64"
            suffix: "mac-arm64.dmg"
          - os: windows-latest
            name: Windows EXE
            kernel_path: "../app/kernel/SiYuan-Kernel.exe"
            build_args_prefix: "-s -w -H=windowsgui -X"
            build_args_suffix: "Mode=prod"
            electron_args: "dist"
            goos: "windows"
            gobin: "bin"
            mingwsys: "MINGW64"
            goarch: "amd64"
            suffix: "win.exe"

    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}

      - name: Set up MingGW (Windows)
        uses: msys2/setup-msys2@v2
        if: contains(matrix.config.goos, 'windows')
        with:
          install: p7zip mingw-w64-x86_64-lua

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel/go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g ${{ needs.get_version.outputs.packageManager }}
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: Configure pnpm for Windows (avoid MAX_PATH with NSIS)
        if: contains(matrix.config.goos, 'windows')
        run: echo "node-linker=hoisted" >> .npmrc
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: Build UI
        run: pnpm run build
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: Clean Build Directories
        shell: bash
        run: |
          rm -rf app/build app/kernel-linux app/kernel app/kernel-darwin app/kernel-darwin-arm64

      - name: Build Kernel
        run: go build -tags fts5 -o "${{ matrix.config.kernel_path }}" -v -ldflags "${{ matrix.config.build_args_prefix }} github.com/${{ github.repository }}/kernel/util.${{ matrix.config.build_args_suffix }}"
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/kernel
        env:
          GO111MODULE: on
          CGO_ENABLED: 1
          GOOS: ${{ matrix.config.goos }}
          GOPATH: ${{ github.workspace }}/go
          GOARCH: ${{ matrix.config.goarch }}

      - name: Build Electron App
        run: pnpm run ${{ matrix.config.electron_args }}
        working-directory: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: siyuan-${{ matrix.config.suffix }}
          path: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-${{ needs.get_version.outputs.version }}-${{ matrix.config.suffix }}
          retention-days: 7

      - name: Upload to Release
        if: ${{ github.event.inputs.upload_release == 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.get_version.outputs.release_tag }}
          name: ${{ needs.get_version.outputs.release_tag }}
          files: ${{ github.workspace }}/go/src/github.com/${{ github.repository }}/app/build/siyuan-${{ needs.get_version.outputs.version }}-${{ matrix.config.suffix }}
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          fail_on_unmatched_files: false

  # 构建 Docker 镜像
  build_docker:
    if: ${{ github.event.inputs.build_docker == 'true' }}
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: get_version
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push
        run: |
          TAGS=("latest")
          if [ -n "${{ github.event.inputs.docker_tag }}" ]; then
            TAGS+=("${{ github.event.inputs.docker_tag }}")
          else
            TAGS+=("v${{ needs.get_version.outputs.version }}")
          fi
          TAG_ARGS=()
          for tag in "${TAGS[@]}"; do
            TAG_ARGS+=("-t" "${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.docker_hub_repo }}:${tag}")
          done
          docker buildx build --push \
            --platform linux/amd64,linux/arm64,linux/arm/v7 \
            "${TAG_ARGS[@]}" \
            .
